name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: catches HA drift even when this repo hasn't changed.
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  contract:
    name: Contract tests (HA ${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test harness (${{ matrix.channel }})
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.channel }}" = "beta" ]; then
            pip install --pre --upgrade pytest-homeassistant-custom-component
          else
            pip install pytest-homeassistant-custom-component
          fi
      - name: Show resolved Home Assistant version
        run: pip show homeassistant | head -2
      - name: Run contract tests
        run: python -m pytest tests/ -v

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Remove once the home-assistant/brands PR for helmsman merges.
          ignore: brands
